<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KopiRec — Detail {{ coffee_shop.Nama }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #E3E8E2; color: #242625; }
    </style>
</head>
<body class="antialiased min-h-screen font-sans">

    <!-- HEADER: Konsisten dengan Halaman Lain -->
    <header class="w-full bg-[#F4F6F3]/90 backdrop-blur-md sticky top-0 z-50 border-b border-neutral-300/40 shadow-xs">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <a href="/" class="font-serif text-2xl font-bold tracking-tight italic text-[#242625]">
                KopiRec<span class="text-[#C87A53]">.</span>
            </a>
            <button onclick="history.back()" class="text-[10px] uppercase font-bold tracking-widest bg-white border border-neutral-300 px-4 py-2 rounded-xl text-[#242625] hover:bg-neutral-50 hover:border-neutral-400 transition shadow-2xs flex items-center gap-1.5">
                <i class="fa-solid fa-arrow-left text-[#C87A53]"></i> Kembali
            </button>
        </div>
    </header>

    <!-- MAIN AREA -->
    <main class="max-w-4xl mx-auto px-6 py-12 sm:py-16">
        
        <!-- GRID UTAMA: Gambar & Info Singkat -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start mb-12">
            
            <!-- FOTO COFFEE SHOP -->
            <div class="md:col-span-5 w-full h-64 md:h-72 rounded-2xl overflow-hidden bg-neutral-200 shadow-md border border-neutral-200/60 relative group">
                <img src="{{ url_for('static', filename='images/' + coffee_shop.No|string + '.jpg') }}" 
                     alt="{{ coffee_shop.Nama }}" 
                     class="w-full h-full object-cover transform group-hover:scale-102 transition-transform duration-700"
                     onerror="this.onerror=null; this.src='https://placehold.co/600x400/242625/FFF?text=KopiRec';">
                <span class="absolute top-4 left-4 text-[9px] font-mono font-bold bg-[#242625]/90 text-white backdrop-blur-xs px-2.5 py-1 rounded-md tracking-wider shadow-sm">INDEX #{{ coffee_shop.No }}</span>
            </div>

            <!-- NAMA, ALAMAT, & HARGA -->
            <div class="md:col-span-7 flex flex-col justify-between h-full space-y-6 pt-2">
                <div class="space-y-4">
                    <div class="inline-flex items-center gap-2 bg-[#C87A53]/10 border border-[#C87A53]/30 text-[#C87A53] px-3 py-1.5 rounded-full shadow-2xs">
                        <i class="fa-solid fa-mug-hot text-[10px]"></i>
                        <span class="text-[9px] uppercase font-bold tracking-widest">Detail Coffee shop</span>
                    </div>
                    
                    <h1 class="font-serif text-4xl sm:text-5xl font-bold tracking-tight text-[#242625] leading-tight">
                        {{ coffee_shop.Nama }}
                    </h1>
                    
                    <p class="text-sm text-neutral-600 flex items-start gap-2 leading-relaxed font-medium">
                        <i class="fa-solid fa-location-dot text-[#C87A53] text-sm mt-0.5 flex-shrink-0"></i>
                        <span>{{ coffee_shop.Alamat }}</span>
                    </p>
                </div>

                <!-- ESTIMASI HARGA -->
                <div class="bg-[#F4F6F3] border border-neutral-200/80 rounded-2xl p-5 flex items-center justify-between shadow-2xs max-w-sm">
                    <div>
                        <span class="text-[8px] font-mono tracking-widest text-neutral-400 uppercase block font-bold mb-0.5">Estimasi Rata-rata Harga</span>
                        <p class="text-2xl font-bold text-[#C87A53]">Rp {{ coffee_shop.Harga|int }}.000</p>
                    </div>
                    <!-- Tombol Maps di hasil.html -->
                    <a href="https://www.google.com/maps/search/?api=1&query={{ coffee_shop.Nama|urlencode }}+Surakarta" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    class="bg-[#242625] text-white rounded-xl text-[10px] font-bold uppercase tracking-wider text-center py-2 px-3 hover:bg-[#343735] transition-all flex items-center justify-center gap-1.5 shadow-2xs">
                        <i class="fa-solid fa-map-location-dot text-[#C87A53]"></i> Maps
                    </a>
                </div>
            </div>

        </div>

        <!-- DETAIL DATA SPESIFIK: Fasilitas & Menu -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16">
            
            <!-- BLOK FASILITAS -->
            <div class="bg-[#F4F6F3] rounded-2xl p-6 md:p-8 border border-neutral-200/80 shadow-xs space-y-4">
                <div class="flex items-center gap-2 pb-3 border-b border-neutral-300/40">
                    <div class="w-7 h-7 rounded-lg bg-white border border-neutral-200 flex items-center justify-center text-[#C87A53]">
                        <i class="fa-solid fa-wifi text-xs"></i>
                    </div>
                    <h3 class="text-xs font-bold uppercase tracking-wider text-neutral-400">Fasilitas</h3>
                </div>
                <p class="text-base font-semibold text-[#242625] leading-relaxed">
                    {{ coffee_shop.Fasilitas }}
                </p>
            </div>

            <!-- BLOK KATEGORI MENU -->
            <div class="bg-[#F4F6F3] rounded-2xl p-6 md:p-8 border border-neutral-200/80 shadow-xs space-y-4">
                <div class="flex items-center gap-2 pb-3 border-b border-neutral-300/40">
                    <div class="w-7 h-7 rounded-lg bg-white border border-neutral-200 flex items-center justify-center text-[#C87A53]">
                        <i class="fa-solid fa-utensils text-xs"></i>
                    </div>
                    <h3 class="text-xs font-bold uppercase tracking-wider text-neutral-400">Kategori Menu</h3>
                </div>
                <p class="text-base font-semibold text-[#242625] leading-relaxed">
                    {{ coffee_shop.Menu }}
                </p>
            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="w-full py-8 text-center text-[10px] font-mono text-neutral-400 uppercase tracking-[0.2em] bg-[#F4F6F3]/50 border-t border-neutral-200/60">
        KOPIREC SURAKARTA © 2026
    </footer>

</body>
</html>
